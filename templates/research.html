{% extends "base.html" %}
{% block title %}Research — LLVM DiffTester{% endblock %}

{% block head %}
<style>
  .research-embed {
    margin: -2rem;
    width: calc(100% + 4rem);
    height: calc(100vh);
    min-height: 600px;
  }
  .research-embed iframe {
    display: block;
    width: 100%;
    height: 100%;
    border: none;
  }
  @media (max-width: 768px) {
    .research-embed {
      margin: -1rem;
      width: calc(100% + 2rem);
      height: calc(100vh - 1rem);
    }
  }
</style>
{% endblock %}

{% block content %}
<div class="research-embed">
  <iframe
    src="{{ url_for('static', filename='llvm-research-tool.html') }}"
    title="LLVM Compiler Fuzzing &amp; IR Constraints Reference"
  ></iframe>
</div>
{% endblock %}
