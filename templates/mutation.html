{% extends "base.html" %}
{% block title %}Mutation — LLVM DiffTester{% endblock %}

{% block head %}
<style>
  .tool-embed {
    margin: -2rem;
    width: calc(100% + 4rem);
    height: calc(100vh);
    min-height: 600px;
  }
  .tool-embed iframe {
    display: block;
    width: 100%;
    height: 100%;
    border: none;
  }
  @media (max-width: 768px) {
    .tool-embed {
      margin: -1rem;
      width: calc(100% + 2rem);
      height: calc(100vh - 1rem);
    }
  }
</style>
{% endblock %}

{% block content %}
<div class="tool-embed">
  <iframe
    src="{{ url_for('static', filename='llvm-mutation-tool.html') }}"
    title="LLVM IR Mutation Tool"
  ></iframe>
</div>
{% endblock %}
